name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify-release:
    name: Verify tag, lint, and test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify tag matches backend package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' backend/pyproject.toml | head -n 1)"

          echo "Tag version: ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"

          if [ -z "${PACKAGE_VERSION}" ]; then
            echo "Could not read version from backend/pyproject.toml"
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Git tag version does not match backend/pyproject.toml"
            exit 1
          fi

          echo "version=${TAG_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Test backend
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          pytest tests/ -v --tb=short

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci

      - name: Lint frontend
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm run lint

      - name: Test frontend
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm test

  build-python-dist:
    name: Build Python distributions
    runs-on: ubuntu-latest
    needs: verify-release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build twine
          cd backend
          python -m build
          twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: backend/dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-python-dist
    environment:
      name: pypi
      url: https://pypi.org/project/aimdl-dashboard-api/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: verify-release
    environment:
      name: dockerhub

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            openmsi/aimdl-dashboard:${{ needs.verify-release.outputs.version }}
            openmsi/aimdl-dashboard:latest