version: 2.1

orbs:
  python: circleci/python@2.1

jobs:
  lint-backend:
    executor:
      name: python/default
      tag: "3.9"
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install backend dependencies
          command: |
            cd backend
            pip install -e ".[dev]"
      - run:
          name: Lint backend
          command: |
            cd backend
            ruff check src/ tests/
            ruff format --check src/ tests/

  test-backend:
    executor:
      name: python/default
      tag: "3.9"
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install backend dependencies
          command: |
            cd backend
            pip install -e ".[dev]"
      - run:
          name: Run backend tests
          command: |
            cd backend
            python -m pytest tests/ -v --tb=short --junitxml=test-results/results.xml
      - store_test_results:
          path: backend/test-results

  lint-frontend:
    docker:
      - image: cimg/node:22.16
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: cd frontend && npm ci
      - run:
          name: Lint frontend
          command: cd frontend && npm run lint

  test-frontend:
    docker:
      - image: cimg/node:22.16
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: cd frontend && npm ci
      - run:
          name: Run frontend tests
          command: cd frontend && npm test

  build-frontend:
    docker:
      - image: cimg/node:22.16
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: cd frontend && npm ci
      - run:
          name: Build frontend
          command: cd frontend && npm run build
      - persist_to_workspace:
          root: .
          paths:
            - frontend/dist

workflows:
  test-and-build:
    jobs:
      - lint-backend
      - lint-frontend
      - test-backend:
          requires:
            - lint-backend
      - test-frontend:
          requires:
            - lint-frontend
      - build-frontend:
          requires:
            - test-frontend

  release:
    jobs:
      - lint-backend:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - lint-frontend:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-backend:
          requires:
            - lint-backend
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - test-frontend:
          requires:
            - lint-frontend
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
